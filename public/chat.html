<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>الشات — ARABI chat</title>
<style>
:root{
  --bg:#0f1114;
  --panel:#111418;
  --mine:#1900fd;
  --other:#2a2f36;
  --text:#eaf6f3;
}
body{
  margin:0;
  height:100vh;
  background:#0b1316;
  color:var(--text);
  font-family:"Cairo",sans-serif;
  display:flex;
  flex-direction:column;
  direction:rtl;
}
.header{
  background:#111418;
  padding:14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid #222;
}
.header h1{margin:0;font-size:18px;color:var(--mine);}
.header button{
  background:#ff4d4d;
  border:none;
  padding:6px 12px;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
  font-weight:600;
}
.chat-wrap{display:flex;flex-direction:column;height:100vh;}
.messages{
  flex:1;
  overflow-y:auto;
  padding:22px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.msg-row{display:flex;gap:12px;align-items:flex-start;width:100%}
.msg-other{justify-content:flex-start;direction:ltr}
.msg-mine{justify-content:flex-end;direction:ltr}
.avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;cursor:pointer}
.bubble{max-width:78%;padding:10px 14px;border-radius:14px;color:var(--text);box-shadow:0 6px 18px rgba(0,0,0,0.4);display:flex;flex-direction:column;gap:4px}
.msg-mine .bubble{background:var(--mine);border-bottom-right-radius:4px;text-align:right}
.msg-other .bubble{background:var(--other);border-bottom-left-radius:4px;text-align:right}
.bubble .who{font-weight:700;font-size:14px}
.bubble .text{font-size:16px}
.bubble .meta{font-size:12px;opacity:.6}
.input-area{
  padding:12px;
  display:flex;
  gap:10px;
  background:#111;
}
.input-area input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#222;
  color:#fff;
}
.btn-send{
  padding:10px 16px;
  border-radius:10px;
  border:none;
  background:var(--mine);
  color:#fff;
  font-weight:700;
  cursor:pointer
}
#userMenu{display:none;position:absolute;background:#111;padding:10px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.4);z-index:100}
#userMenu div{padding:6px 12px;cursor:pointer}
#userMenu div:hover{background:#222}
/* ألوان الرتب */
.rank-مدير { color: gold; font-weight: bold; }
.rank-سوبر { color: orange; font-weight: bold; }
.rank-أدمن { color: greenyellow; font-weight: bold; }
.rank-مشرف { color: deepskyblue; font-weight: bold; }
.rank-بروميم { color: cyan; font-weight: bold; }
.rank-عضو  { color: gray; font-weight: bold; }
</style>
</head>
<body>

<div class="chat-wrap">
<div class="header">
<h1>غرفة الدردشة</h1>
<button onclick="leaveChat()">خروج</button>
</div>

<div class="messages" id="messages"></div>

<div class="input-area">
<input id="msgInput" type="text" placeholder="اكتب رسالتك..." autocomplete="off" />
<button class="btn-send" id="sendBtn">إرسال</button>
</div>
</div>

<div id="userMenu">
<div onclick="setRank('👑 مدير الموقع')">👑 مدير الموقع</div>
<div onclick="setRank('⭐ سوبر أدمن')">⭐ سوبر أدمن</div>
<div onclick="setRank('🏅 أدمن')">🏅 أدمن</div>
<div onclick="setRank('🛡️ مشرف')">🛡️ مشرف</div>
<div onclick="setRank('💎 بروميم')">💎 بروميم</div>
<div onclick="setRank('👤 عضو')">👤 عضو</div>
</div>

<script>
const username = localStorage.getItem("username") || "MOHAMED";
const avatar = localStorage.getItem("avatar") || "https://i.pravatar.cc/60";

const messagesDiv = document.getElementById("messages");
const input = document.getElementById("msgInput");
const sendBtn = document.getElementById("sendBtn");

const userRanks = { "MOHAMED": "👑 مدير الموقع" }; // تعريف صح
const adminUser = "MOHAMED"; // المدير الوحيد

function getUserRank(user){
  return userRanks[user] || "👤 عضو";
}

function getRankClass(rank){
  if(rank.includes("مدير")) return "rank-مدير";
  if(rank.includes("سوبر")) return "rank-سوبر";
  if(rank.includes("أدمن")) return "rank-أدمن";
  if(rank.includes("مشرف")) return "rank-مشرف";
  if(rank.includes("بروميم")) return "rank-بروميم";
  return "rank-عضو";
}

function addMessageToDOM(user, avatarUrl, text, isMine=false, timeStr=null){
  const row = document.createElement("div");
  row.className = "msg-row " + (isMine ? "msg-mine" : "msg-other");

  const rank = getUserRank(user);
  const rankClass = getRankClass(rank);

  row.innerHTML = `
    <img class="avatar" src="${escapeHtml(avatarUrl)}" alt="avatar" onclick="showUserMenu('${user}', event)">
    <div class="bubble">
      <div class="who">${escapeHtml(user)} <span class="${rankClass}">${rank}</span></div>
      <div class="text">${escapeHtml(text)}</div>
      <div class="meta">${timeStr || (new Date()).toLocaleTimeString()}</div>
    </div>
  `;
  messagesDiv.appendChild(row);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function sendMessage(){
  const txt = input.value.trim();
  if(!txt) return;
  addMessageToDOM(username, avatar, txt, true, new Date().toLocaleTimeString());
  input.value = "";
}

sendBtn.addEventListener("click", sendMessage);
input.addEventListener("keydown",(e)=>{ if(e.key==="Enter"){sendMessage()} });

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, (m)=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));
}

let selectedUser = null;
function showUserMenu(user, e){
  if(username !== adminUser) return; // فقط المدير يظهر المنيو
  selectedUser = user;
  const menu = document.getElementById("userMenu");
  menu.style.display = "block";
  menu.style.top = e.clientY + "px";
  menu.style.left = e.clientX + "px";
}

function setRank(rank){
  if(username !== adminUser) return; 
  if(selectedUser){
    const oldRank = getUserRank(selectedUser);
    userRanks[selectedUser] = rank;

    addMessageToDOM(
      "النظام",
      "https://i.pravatar.cc/60",
      `🎉 مبروك لقد أخذ ${selectedUser} رتبة ${rank} (كانت ${oldRank})`,
      false
    );
  }
  document.getElementById("userMenu").style.display = "none";
}

document.addEventListener("click",(e)=>{
  if(!e.target.closest("#userMenu") && !e.target.classList.contains("avatar")){
    document.getElementById("userMenu").style.display="none";
  }
});

function leaveChat(){
  alert("تم تسجيل خروجك من الشات!");
  window.location.href = "index.html";
}

addMessageToDOM("النظام", avatar, username + " دخل الشات", false);
</script>
<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io("https://friendly-umbrella-urtz.onrender.com/"); // رابط السيرفر

  const room = "عام"; 
  socket.emit("joinRoom", { room, username, avatar });

  socket.on("messageHistory", (messages) => {
    messages.forEach(msg => {
      addMessageToDOM(msg.user, msg.avatar || "https://i.pravatar.cc/60", msg.msg || msg.text, msg.user === username, msg.time);
    });
  });

  socket.on("message", (msg) => {
    addMessageToDOM(msg.user, msg.avatar || "https://i.pravatar.cc/60", msg.msg || msg.text, msg.user === username, msg.time);
  });

  socket.on("systemMessage", (txt) => {
    addMessageToDOM("النظام", "https://i.pravatar.cc/60", txt, false);
  });

  const oldSend = sendMessage;
  sendMessage = function(){
    const txt = input.value.trim();
    if(!txt) return;
    socket.emit("chatMessage", { room, user: username, avatar, msg: txt, time: new Date().toLocaleTimeString() });
    oldSend();
  }
</script>

</body>
</html>
<!-- نافذة البروفايل المنبثق -->
<div class="modal-bg" id="profileModal">
  <div class="modal-content">
    <button class="close-btn" id="profileClose">&times;</button>
    <div class="profile-top">
      <div class="profile-background" id="profileHeader"></div>
      <img src="" class="profile-avatar" id="profileImage">
      <div class="profile-actions">
        <button class="add-friend">إضافة صديق</button>
        <button class="message-user">مراسلة خاصة</button>
      </div>
    </div>
    <div class="profile-body">
      <h2 id="profileName">اسم المستخدم</h2>
      <p id="profileStatus">نشط الآن</p>
      <div class="profile-info">
        <h4>الرومات الحالية:</h4>
        <ul id="profileRooms"></ul>
      </div>
    </div>
  </div>
</div>

<style>
.modal-bg {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;

}
.modal-content {
  background: #1a1a1a;
  width: 360px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow:0 8px 25px rgba(0,0,0,0.5);
  position: relative;
  color:#fff;
  font-family:"Cairo",sans-serif;
}
.close-btn { position:absolute; top:10px; left:10px; background:#d63031; border:none; border-radius:50%; width:30px; height:30px; color:#fff; font-weight:bold; cursor:pointer; }
.profile-top { position: relative; height:120px; }
.profile-background { width:100%; height:100%; background-size:cover; background-position:center; }
.profile-avatar {
  width: 80px; height:80px;
  border-radius:50%;
  border:3px solid #fff;
  position:absolute;
  bottom:-40px;
  left:20px;
}
.profile-actions {
  position:absolute;
  bottom:-30px;
  right:20px;
  display:flex; gap:10px;
}
.profile-actions button {
  padding:6px 12px;

  border-radius:6px;

  font-weight:bold;
}
.add-friend { background:#00b894; color:#fff; }
.add-friend:hover { background:#00d084; }
.message-user { background:#0984e3; color:#fff; }
.message-user:hover { background:#74b9ff; }
.profile-body { padding:50px 20px 20px 20px; text-align:left; }
.profile-body h2 { margin:0 0 5px 0; font-size:20px; }
.profile-body p { margin:0 0 10px 0; color:#ccc; font-size:14px; }
.profile-info h4 { margin:0 0 5px 0; font-size:14px; color:#aaa; }
.profile-info ul { list-style:none; padding:0; margin:0; }
.profile-info ul li { font-size:14px; color:#bbb; margin-bottom:3px; padding-left:10px; position:relative; }
.profile-info ul li::before { content:"•"; color:#00bfff; position:absolute; left:0; }
</style>

<script>
function showUserProfile(userData){
  document.getElementById('profileModal').style.display = 'flex';
  document.getElementById('profileName').innerText = userData.name;
  document.getElementById('profileStatus').innerText = userData.status;
  document.getElementById('profileImage').src = userData.avatar;
  document.getElementById('profileHeader').style.background = `url('${userData.background}') center/cover no-repeat`;
  const roomsList = document.getElementById('profileRooms');
  roomsList.innerHTML = '';
  userData.rooms.forEach(room=>{
    const li = document.createElement('li');
    li.innerText = room;
    roomsList.appendChild(li);
  });
}
document.getElementById('profileClose').addEventListener('click',()=>{
  document.getElementById('profileModal').style.display='none';
});
window.addEventListener('click',(e)=>{
  if(e.target===document.getElementById('profileModal')){
    document.getElementById('profileModal').style.display='none';
  }
});
document.addEventListener('click',(e)=>{
  if(e.target.classList.contains('avatar')){
    const userData = {
      name: e.target.getAttribute('data-username') || 'اسم المستخدم',
      status: 'نشط الآن',
      avatar: e.target.src,
      background: 'https://images.unsplash.com/photo-1503264116251-35a269479413?crop=entropy&cs=tinysrgb&fit=max&fm=jpg',
      rooms: ['#شات-عام','#تكنولوجيا','#ألعاب']
    };
    showUserProfile(userData);
  }
});
</script>
<script>
// قائمة الأصدقاء محلياً
let friendsList = {}; 

// عند الضغط على زر إضافة صديق
document.querySelector('.add-friend').addEventListener('click',()=>{
  const friend = { name: profileName.innerText, avatar: profileImage.src };
  if(friendsList[friend.name]) return alert('هذا الشخص صديقك بالفعل!');
  // إرسال طلب صداقة للباك إند
  socket.emit('sendFriendRequest', { from: username, to: friend.name, avatar: friend.avatar });
  alert('تم إرسال طلب الصداقة!');
});

// عند الضغط على زر مراسلة خاصة
document.querySelector('.message-user').addEventListener('click',()=>{
  const friend = { name: profileName.innerText, avatar: profileImage.src };
  if(!friendsList[friend.name]) return alert('يجب قبول طلب الصداقة أولاً!');
  openPrivateChat(friend);
});

// فتح شات خاص
function openPrivateChat(friend){
  if(document.getElementById(`chat_${friend.name}`)) return;
  const chatDiv = document.createElement('div'); 
  chatDiv.className = 'private-chat'; 
  chatDiv.id = `chat_${friend.name}`;
  chatDiv.innerHTML = `
    <div class="private-header">
      <span>${friend.name}</span>
      <button onclick="this.parentElement.parentElement.style.display='none'">✖</button>
    </div>
    <div class="private-messages" id="messages_${friend.name}"></div>
    <div class="private-input">
      <input id="input_${friend.name}" placeholder="اكتب رسالة...">
      <button onclick="sendPrivateMessage('${friend.name}')">إرسال</button>
    </div>
  `;
  document.body.appendChild(chatDiv); // أو حطو داخل container مخصص
}

// إرسال رسالة خاصة
function sendPrivateMessage(friendName){
  const inputField = document.getElementById(`input_${friendName}`);
  const msg = inputField.value.trim(); if(!msg) return;
  socket.emit('privateMessage', { to: friendName, from: username, avatar, msg, time: new Date().toLocaleTimeString() });
  inputField.value = '';
}

// استقبال الرسائل الخاصة من الباك إند
socket.on('privateMessage', (data)=>{
  const { from, avatar, msg, time } = data;
  if(!friendsList[from]) friendsList[from] = { name: from, avatar: avatar }; // إضافة للصداقة لو مش موجود
  openPrivateChat(friendsList[from]);
  const messagesDiv = document.getElementById(`messages_${from}`);
  const div = document.createElement('div'); 
  div.className = 'private-msg';
  div.innerHTML = `<img src="${avatar}"><div class="text">${msg}</div><div class="time">${time}</div>`;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
});

// استقبال طلبات الصداقة
socket.on('friendRequest', data => {
  const accept = confirm(`${data.from} أرسل لك طلب صداقة. قبول؟`);
  if(accept){
    friendsList[data.from] = { name: data.from, avatar: data.avatar };
    socket.emit('friendRequestResponse', { from: username, to: data.from, accepted:true });
    alert(`تمت إضافة ${data.from} كصديق!`);
  } else {
    socket.emit('friendRequestResponse', { from: username, to: data.from, accepted:false });
  }
});
</script>
<!-- لوحات المراسلة الخاصة -->
<div class="private-container" id="privateContainer"></div>

<script>
const privateContainer=document.getElementById('privateContainer');

// فتح نافذة شات خاص
function openPrivateChat(friend){
  if(document.getElementById(`chat_${friend.name}`)) return; // لو مفتوح مسبقاً
  const chatDiv=document.createElement('div');
  chatDiv.className='private-chat';
  chatDiv.id=`chat_${friend.name}`;
  chatDiv.style.cssText = `
    position: fixed;
    bottom: 20px;
    right: ${20 + document.querySelectorAll('.private-chat').length*320}px;
    width: 300px;
    background:#111418;
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,0.4);
    display:flex;
    flex-direction:column;
    z-index:9999;
    font-family:"Cairo",sans-serif;
  `;
  chatDiv.innerHTML=`
    <div class="private-header" style="padding:10px; background:#222; display:flex; justify-content:space-between; align-items:center; color:#fff; font-weight:bold; border-top-left-radius:10px; border-top-right-radius:10px;">
      ${friend.name}
      <button style="background:red;color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;" onclick="this.parentElement.parentElement.remove()">✖</button>
    </div>
    <div class="private-messages" id="messages_${friend.name}" style="flex:1; padding:8px; overflow-y:auto; display:flex; flex-direction:column; gap:6px; max-height:250px;"></div>
    <div class="private-input" style="display:flex; padding:8px; gap:6px; background:#222; border-bottom-left-radius:10px; border-bottom-right-radius:10px;">
      <input id="input_${friend.name}" placeholder="اكتب رسالة..." style="flex:1; padding:6px; border-radius:6px; border:none; outline:none;"/>
      <button onclick="sendPrivateMessage('${friend.name}')" style="background:var(--mine); color:#fff; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">إرسال</button>
    </div>
  `;
  privateContainer.appendChild(chatDiv);
}

// إرسال رسالة خاصة
function sendPrivateMessage(friendName){
  const inputField=document.getElementById(`input_${friendName}`);
  const msg=inputField.value.trim(); if(!msg) return;
  socket.emit('privateMessage', { to: friendName, from: username, avatar, msg, time: new Date().toLocaleTimeString() });
  inputField.value='';
}

// استقبال الرسائل الخاصة
socket.on('privateMessage', (data)=>{
  const { from, avatar, msg, time } = data;
  const friend = { name: from, avatar: avatar };
  openPrivateChat(friend); // فتح الشات لو مش مفتوح
  const messagesDiv=document.getElementById(`messages_${from}`);
  const msgDiv=document.createElement('div');
  msgDiv.style.cssText = `
    display:flex;
    gap:6px;
    align-items:flex-start;
    flex-direction:${from===username?'row-reverse':'row'};
    background:${from===username?'#1900fd':'#2a2f36'};
    color:#fff;
    padding:6px 8px;
    border-radius:8px;
    max-width:80%;
    align-self:${from===username?'flex-end':'flex-start'};
  `;
  msgDiv.innerHTML=`
    <img src="${avatar}" style="width:32px; height:32px; border-radius:50%; object-fit:cover;">
    <div style="display:flex; flex-direction:column;">
      <span style="font-weight:bold; font-size:13px;">${from}</span>
      <span>${msg}</span>
      <span style="font-size:10px; opacity:0.6;">${time}</span>
    </div>
  `;
  messagesDiv.appendChild(msgDiv);
  messagesDiv.scrollTop=messagesDiv.scrollHeight;
});
</script>
